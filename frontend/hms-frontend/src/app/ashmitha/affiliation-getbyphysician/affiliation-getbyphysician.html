<div class="container">
  <h2>Get Affiliations By Physician</h2>

  <label>Employee ID</label>
  <input
    type="number"
    [(ngModel)]="employeeId"
    name="employeeId"
    placeholder="Enter Employee ID"
  >

  <p class="error" *ngIf="error">{{ error }}</p>

  <button type="button" (click)="fetchAffiliations()">Fetch</button>

  <div class="result" *ngIf="result">
    <h3>Response</h3>
    <pre>{{ result | json }}</pre>
  </div>
</div>
