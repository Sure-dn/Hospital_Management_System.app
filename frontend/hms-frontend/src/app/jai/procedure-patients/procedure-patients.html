<div class="container">

  <h2>рЯІСвАНрЯ§ЭвАНрЯІС Patients by Procedure</h2>

  <div class="input-box">
    <input 
      type="text"  
      [(ngModel)]="code"
      placeholder="Enter Procedure Code"
    />
    <button (click)="load()">Fetch</button>
  </div>

  <!-- ERROR -->
  <p class="error" *ngIf="error">{{ error }}</p>

  <!-- LOADING -->
  <p *ngIf="loading">Loading...</p>

  <!-- TABLE -->
  <table *ngIf="!loading && data.length > 0">
    <thead>
      <tr>
        <th>Patient ID</th>
        <th>Procedure ID</th>
        <th>Stay ID</th>
        <th>Date</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of data">
        <td>{{ p.patientId }}</td>
        <td>{{ p.procedureId }}</td>
        <td>{{ p.stayId }}</td>
        <td>{{ p.dateUndergoes | date:'dd-MM-yyyy' }}</td>
      </tr>
    </tbody>
  </table>

  <!-- NO DATA -->
  <p *ngIf="!loading && hasSearched && data.length === 0 && !error">
    вЪ†пЄП No data found
  </p>

</div>
