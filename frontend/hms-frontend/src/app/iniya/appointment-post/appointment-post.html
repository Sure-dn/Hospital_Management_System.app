<div class="container">

  <h2>📅 Create Appointment</h2>

  <input type="number" placeholder="Appointment ID"
         [(ngModel)]="appointment.appointmentId">

  <input type="number" placeholder="Patient SSN"
         [(ngModel)]="appointment.patientSsn">

  <input type="number" placeholder="Prep Nurse ID"
         [(ngModel)]="appointment.prepNurseId">

  <input type="number" placeholder="Physician ID"
         [(ngModel)]="appointment.physicianId">

  <label>Start Time</label>
  <!-- ✅ No AM/PM, pure 24-hour -->
  <input type="datetime-local"
         [(ngModel)]="appointment.starttime">

  <label>End Time</label>
  <input type="datetime-local"
         [(ngModel)]="appointment.endtime">

  <input type="text" placeholder="Examination Room"
         [(ngModel)]="appointment.examinationRoom">

  <button (click)="create()">Create</button>

  <p *ngIf="success" style="color: green;">
    {{ success }}
  </p>

  <p *ngIf="backendError" style="color: red;">
    {{ backendError }}
  </p>

</div>
