<div class="form-container">
  <h2>Create Nurse</h2>

  <form (ngSubmit)="create()">

    <input 
      type="text" 
      [(ngModel)]="nurse.name" 
      name="name" 
      placeholder="Name" 
      required>
    <br>

    <input 
      type="text" 
      [(ngModel)]="nurse.position" 
      name="position" 
      placeholder="Position" 
      required>
    <br>

    <input 
      type="number" 
      [(ngModel)]="nurse.ssn" 
      name="ssn" 
      placeholder="SSN" 
      required>
    <br>

    <button type="submit">Create</button>

  </form>

  <p>{{ message }}</p>

  <h3>Response:</h3>
  <pre>{{ data | json }}</pre>
</div>
