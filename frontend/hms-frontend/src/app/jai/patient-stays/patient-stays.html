<div class="container">

  <h2>Patient Stays</h2>

  <div class="input-box">
    <input [(ngModel)]="ssn" placeholder="Enter Patient SSN">
    <button (click)="load()">Fetch</button>
  </div>

  <!-- 🔥 ERROR -->
  <p class="error" *ngIf="error">{{ error }}</p>

  <!-- 🔄 LOADING -->
  <p *ngIf="loading">Loading...</p>

  <!-- ✅ TABLE -->
  <table *ngIf="!loading && stays.length > 0">
    <thead>
      <tr>
        <th>Stay ID</th>
        <th>Room Number</th>
        <th>Start Date</th>
        <th>End Date</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let s of stays">
        <td>{{ s.stayId }}</td>

        <!-- ✅ FIXED FIELD -->
        <td>{{ s.room?.roomNumber }}</td>

        <!-- ✅ DATE FORMAT -->
        <td>{{ s.stayStart | date:'dd-MM-yyyy' }}</td>
        <td>{{ s.stayEnd | date:'dd-MM-yyyy' }}</td>
      </tr>
    </tbody>
  </table>

  <!-- ❌ EMPTY -->
  <p *ngIf="!loading && stays.length === 0 && !error">
    No stays found
  </p>

</div>
