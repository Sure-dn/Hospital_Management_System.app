

<h2>Get Room By Number</h2>

<input 
  type="number" 
  [(ngModel)]="roomNumber" 
  placeholder="Room Number"
>
<br><br>

<button (click)="getRoom()">Get Room</button>

<!-- 🔴 No Data -->
<p *ngIf="data && !data.data" style="color:red;">
  No room found
</p>

<!-- 🟢 TABLE -->
<table *ngIf="data?.data" border="1"
       style="margin-top:20px; width:100%; text-align:center;">

  <thead>
    <tr>
      <th>Room Number</th>
      <th>Type</th>
      <th>Unavailable</th>
      <th>Block Floor</th>
      <th>Block Code</th>
      <th>Block Name</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>{{ data.data.roomNumber }}</td>
      <td>{{ data.data.type }}</td>
      <td>{{ data.data.unavailable }}</td>
      <td>{{ data.data.blockFloor }}</td>
      <td>{{ data.data.blockCode }}</td>
      <td>{{ data.data.blockName }}</td>
    </tr>
  </tbody>

</table>
