<div class="container">
  <h2>➕ Create Appointment</h2>

  <form (submit)="$event.preventDefault()">

    <input type="number"
           [(ngModel)]="appointment.appointmentId"
           name="appointmentId"
           placeholder="Appointment ID">
    <p class="error" *ngIf="errors.appointmentId">{{ errors.appointmentId }}</p>

    <input type="number"
           [(ngModel)]="appointment.patientSsn"
           name="patientSsn"
           placeholder="Patient SSN">
    <p class="error" *ngIf="errors.patientSsn">{{ errors.patientSsn }}</p>

    <input type="number"
           [(ngModel)]="appointment.prepNurseId"
           name="prepNurseId"
           placeholder="Prep Nurse ID">

    <input type="number"
           [(ngModel)]="appointment.physicianId"
           name="physicianId"
           placeholder="Physician ID">
    <p class="error" *ngIf="errors.physicianId">{{ errors.physicianId }}</p>

    <label>Start Time</label>
    <input type="datetime-local"
           [(ngModel)]="appointment.starttime"
           name="starttime">

    <label>End Time</label>
    <input type="datetime-local"
           [(ngModel)]="appointment.endtime"
           name="endtime">

    <input type="text"
           [(ngModel)]="appointment.examinationRoom"
           name="examinationRoom"
           placeholder="Room (A101)">
    <p class="error" *ngIf="errors.examinationRoom">{{ errors.examinationRoom }}</p>

    <!-- Backend Error -->
    <p class="backend-error" *ngIf="backendError">
      {{ backendError }}
    </p>

    <!-- Success -->
    <p class="success" *ngIf="success">
      {{ success }}
    </p>

    <button type="button" (click)="create()">Create</button>

  </form>

  <pre *ngIf="response">{{ response | json }}</pre>
</div>
