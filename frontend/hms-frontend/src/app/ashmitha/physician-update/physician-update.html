<div class="page-box">
  <h2>Update Physician</h2>

  <input type="number" placeholder="Employee ID" [(ngModel)]="physician.employeeId">
  <input type="text" placeholder="Name" [(ngModel)]="physician.name">
  <input type="text" placeholder="Position" [(ngModel)]="physician.position">
  <input type="number" placeholder="SSN" [(ngModel)]="physician.ssn">

  <button (click)="updatePhysician()">Update</button>
</div>
