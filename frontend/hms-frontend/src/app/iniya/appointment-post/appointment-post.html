<h2>➕ Create Appointment</h2>

<input type="number" [(ngModel)]="appointmentId" placeholder="Appointment ID">

<input type="number" [(ngModel)]="patientSsn" placeholder="Patient SSN">

<input type="number" [(ngModel)]="prepNurseId" placeholder="Prep Nurse ID">

<input type="number" [(ngModel)]="physicianId" placeholder="Physician ID">

<!-- ISO format input -->
<label>Start Time</label>
<input type="text" [(ngModel)]="starttime" placeholder="YYYY-MM-DDTHH:mm">

<label>End Time</label>
<input type="text" [(ngModel)]="endtime" placeholder="YYYY-MM-DDTHH:mm">

<input type="text" [(ngModel)]="examinationRoom" placeholder="Examination Room (A101)">

<button (click)="create()">Create</button>

<p *ngIf="success" style="color: green;">{{ success }}</p>
<p *ngIf="error" style="color: red;">{{ error }}</p>

<pre *ngIf="response">{{ response | json }}</pre>
