<div class="container">

  <h2>🏥 Get Stay Details</h2>

  <div class="form">
    <input 
      type="number"
      [(ngModel)]="stayId"
      (ngModelChange)="onIdChange()"
      placeholder="Enter Stay ID"
    >

    <button (click)="fetch()">Fetch</button>
  </div>

  <!-- 🔄 LOADING -->
  <p *ngIf="loading">Loading...</p>

  <!-- ❌ ERROR -->
  <p class="error" *ngIf="error">{{ error }}</p>

  <!-- ✅ RESULT -->
  <div *ngIf="!loading && data" class="result">
    <h3>Stay Details</h3>

    <p><strong>Stay ID:</strong> {{ data.stayId }}</p>
    <p><strong>Patient ID:</strong> {{ data.patientId }}</p>
    <p><strong>Room ID:</strong> {{ data.roomId }}</p>
    <p><strong>Start Date:</strong> {{ data.stayStart | date:'dd-MM-yyyy' }}</p>
    <p><strong>End Date:</strong> {{ data.stayEnd | date:'dd-MM-yyyy' }}</p>
  </div>

</div>
