<div class="page-box">
  <h2>Create Department</h2>

  <input
    type="number"
    placeholder="Department ID"
    [(ngModel)]="department.departmentId"
    name="departmentId"
  >
  <p class="error" *ngIf="errors.departmentId">{{ errors.departmentId }}</p>

  <input
    type="text"
    placeholder="Department Name"
    [(ngModel)]="department.name"
    name="name"
  >
  <p class="error" *ngIf="errors.name">{{ errors.name }}</p>

  <input
    type="number"
    placeholder="Head Employee ID"
    [(ngModel)]="department.headEmployeeId"
    name="headEmployeeId"
  >
  <p class="error" *ngIf="errors.headEmployeeId">{{ errors.headEmployeeId }}</p>

  <p class="backend-error" *ngIf="backendError">{{ backendError }}</p>
  <p class="success" *ngIf="success">{{ success }}</p>

  <button type="button" (click)="submit()">Submit</button>
</div>
