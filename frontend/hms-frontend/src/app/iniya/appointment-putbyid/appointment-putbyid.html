<div class="container">
  <h2>Update Appointment</h2>

  <input type="number" [(ngModel)]="appointmentId" placeholder="Appointment ID">
  <input type="number" [(ngModel)]="patientSsn" placeholder="Patient SSN">
  <input type="number" [(ngModel)]="prepNurseId" placeholder="Prep Nurse ID">
  <input type="number" [(ngModel)]="physicianId" placeholder="Physician ID">

  <label>Start Time</label>
  <input type="datetime-local" [(ngModel)]="starttime">

  <label>End Time</label>
  <input type="datetime-local" [(ngModel)]="endtime">

  <input type="text" [(ngModel)]="examinationRoom" placeholder="Examination Room">

  <button type="button" (click)="updateAppointment()">Update</button>

  <p class="success" *ngIf="success">{{ success }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>
</div>
