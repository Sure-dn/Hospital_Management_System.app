<div class="container">

  <h2>Update Room Availability</h2>

  <div class="form-box">

    <input type="number" [(ngModel)]="roomNumber" placeholder="Room Number">

    <select [(ngModel)]="unavailable">
      <option [value]="true">Unavailable</option>
      <option [value]="false">Available</option>
    </select>

    <button (click)="update()">Update</button>

  </div>

  <!-- RESULT -->
  <div *ngIf="data" class="result">

    <div class="card">
      <p><b>Message:</b> {{ data.message }}</p>

      <p>
        <b>Status:</b> 
        <span [class.available]="!data.data?.unavailable"
              [class.unavailable]="data.data?.unavailable">
          {{ data.data?.unavailable ? 'Unavailable' : 'Available' }}
        </span>
      </p>
    </div>

  </div>

</div>
