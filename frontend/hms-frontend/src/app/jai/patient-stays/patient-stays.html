<div class="container">

  <h2>Patient Stays</h2>

  <div class="input-box">
    <input 
      type="number"
      [(ngModel)]="ssn"
      (ngModelChange)="onSsnChange()"
      placeholder="Enter Patient ID"
    >

    <button (click)="load()">Fetch</button>
  </div>

  <!-- 🔄 LOADING -->
  <p *ngIf="loading">Loading...</p>

  <!-- ❌ ERROR -->
  <p class="error" *ngIf="error">{{ error }}</p>

  <!-- ✅ TABLE -->
  <table *ngIf="!loading && stays.length > 0">
    <thead>
      <tr>
        <th>Stay ID</th>
        <th>Room Number</th>
        <th>Start Date</th>
        <th>End Date</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let s of stays">
        <td>{{ s.stayId }}</td>
        <td>{{ s.room?.roomNumber }}</td>
        <td>{{ s.stayStart | date:'dd-MM-yyyy' }}</td>
        <td>{{ s.stayEnd | date:'dd-MM-yyyy' }}</td>
      </tr>
    </tbody>
  </table>

</div>
