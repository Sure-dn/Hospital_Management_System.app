<div class="container">
  <h2>Update Nurse</h2>

  <form>

    <input 
      type="number" 
      [(ngModel)]="id" 
      name="employeeId"
      placeholder="Employee ID"
    />

    <input 
      type="text"
      [(ngModel)]="nurse.name" 
      name="name"
      placeholder="Enter Name"
    />

    <input 
      type="text"
      [(ngModel)]="nurse.position" 
      name="position"
      placeholder="Enter Position"
    />

    <div class="checkbox">
      <input 
        type="checkbox" 
        [(ngModel)]="nurse.registered"
        name="registered"
      />
      <span>Registered</span>
    </div>

    <input 
      type="number" 
      [(ngModel)]="nurse.ssn" 
      name="ssn"
      placeholder="Enter SSN"
    />

    <button type="button" (click)="update()">Update</button>

  </form>

  <!-- RESULT -->
  <div *ngIf="data" class="result">
    <h3> Nurse Updated</h3>

    <div class="card">
      <p><b>ID:</b> {{ data.data?.employeeId }}</p>
      <p><b>Name:</b> {{ data.data?.name }}</p>
      <p><b>Position:</b> {{ data.data?.position }}</p>
      <p><b>Registered:</b> {{ data.data?.registered }}</p>
      <p><b>SSN:</b> {{ data.data?.ssn }}</p>
    </div>
  </div>

</div>
