<div class="page-box">
  <h2>Delete Physician</h2>

  <input
    type="number"
    placeholder="Employee ID"
    [(ngModel)]="employeeId"
    name="employeeId"
  >

  <p class="error" *ngIf="error">{{ error }}</p>
  <p class="success" *ngIf="success">{{ success }}</p>

  <button type="button" (click)="deletePhysician()">Delete</button>
</div>
