<div class="container">
  <h2>Get Affiliations By Physician</h2>

  <label>Employee ID</label>
  <input type="number" [(ngModel)]="employeeId" placeholder="Enter Employee ID" />

  <button (click)="fetchAffiliations()">Fetch</button>

  <div class="result" *ngIf="result">
    <h3>Response</h3>
    <pre>{{ result | json }}</pre>
  </div>
</div>
