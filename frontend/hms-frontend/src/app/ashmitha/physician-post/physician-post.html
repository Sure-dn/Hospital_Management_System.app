<div class="page-box">
  <h2>Create Physician</h2>

  <form (submit)="$event.preventDefault()">

    <input
      type="number"
      placeholder="Employee ID"
      [(ngModel)]="physician.employeeId"
      name="employeeId"
    >
    <p class="error" *ngIf="errors.employeeId">{{ errors.employeeId }}</p>

    <input
      type="text"
      placeholder="Name"
      [(ngModel)]="physician.name"
      name="name"
    >
    <p class="error" *ngIf="errors.name">{{ errors.name }}</p>

    <input
      type="text"
      placeholder="Position"
      [(ngModel)]="physician.position"
      name="position"
    >
    <p class="error" *ngIf="errors.position">{{ errors.position }}</p>

    <input
      type="number"
      placeholder="SSN"
      [(ngModel)]="physician.ssn"
      name="ssn"
    >
    <p class="error" *ngIf="errors.ssn">{{ errors.ssn }}</p>

    <p class="backend-error" *ngIf="backendError">{{ backendError }}</p>
    <p class="success" *ngIf="success">{{ success }}</p>

    <button type="button" (click)="submit()">Submit</button>

  </form>
</div>
