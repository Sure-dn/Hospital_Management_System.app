<div class="page-box">
  <h2>Get Department Head</h2>

  <input
    type="number"
    placeholder="Enter Department ID"
    [(ngModel)]="departmentId"
    name="departmentId"
  >

  <p class="error" *ngIf="error">{{ error }}</p>

  <button type="button" (click)="fetchDepartmentHead()">Fetch</button>

  <pre *ngIf="result">{{ result | json }}</pre>
</div>
