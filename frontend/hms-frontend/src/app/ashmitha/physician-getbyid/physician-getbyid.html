<div class="page-box">
  <h2>Get Physician by ID</h2>

  <input
    type="number"
    [(ngModel)]="employeeId"
    placeholder="Enter Employee ID"
  >

  <p class="error" *ngIf="error">{{ error }}</p>

  <button type="button" (click)="fetchPhysician()">Fetch</button>

  <pre *ngIf="result">{{ result | json }}</pre>
</div>
