<div class="container">

  <h2>Add Stay</h2>

  <div class="form">

    <input [(ngModel)]="stayId" placeholder="Stay ID">

    <input [(ngModel)]="patientId" placeholder="Patient ID">

    <input [(ngModel)]="roomId" placeholder="Room ID">

    <input type="datetime-local" [(ngModel)]="startDate">

    <input type="datetime-local" [(ngModel)]="endDate">

    <button (click)="submit()">Submit</button>

  </div>

</div>
