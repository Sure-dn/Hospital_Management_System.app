<div class="page-box">

  <h2>On-Call Assignment</h2>

  <form (submit)="$event.preventDefault()">

    <!-- Employee ID -->
    <input
      type="number"
      placeholder="Employee ID"
      [(ngModel)]="employeeId"
      name="employeeId"
    >
    <p class="error" *ngIf="errors.employeeId">
      {{ errors.employeeId }}
    </p>

    <!-- Block Floor -->
    <input
      type="number"
      placeholder="Block Floor"
      [(ngModel)]="oncall.blockFloor"
      name="blockFloor"
    >
    <p class="error" *ngIf="errors.blockFloor">
      {{ errors.blockFloor }}
    </p>

    <!-- Block Code -->
    <input
      type="number"
      placeholder="Block Code"
      [(ngModel)]="oncall.blockCode"
      name="blockCode"
    >
    <p class="error" *ngIf="errors.blockCode">
      {{ errors.blockCode }}
    </p>

    <!-- Start Time -->
    <input
      type="datetime-local"
      [(ngModel)]="oncall.onCallStart"
      name="onCallStart"
    >
    <p class="error" *ngIf="errors.onCallStart">
      {{ errors.onCallStart }}
    </p>

    <!-- End Time -->
    <input
      type="datetime-local"
      [(ngModel)]="oncall.onCallEnd"
      name="onCallEnd"
    >
    <p class="error" *ngIf="errors.onCallEnd">
      {{ errors.onCallEnd }}
    </p>

    <!-- Backend Error -->
    <p class="backend-error" *ngIf="backendError">
      {{ backendError }}
    </p>

    <!-- Success -->
    <p class="success" *ngIf="success">
      {{ success }}
    </p>

    <button type="button" (click)="assign()">Assign</button>

  </form>

</div>
