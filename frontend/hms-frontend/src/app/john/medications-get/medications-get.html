<style>
    body, html { 
        background: #0b1220; 
        color: #e2e8f0; 
    }
    h1, h2 { color: #60a5fa; text-align: center; }
    button { 
        background: #3b82f6; 
        color: white; 
        padding: 10px 20px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
    }
    pre {
        background: #1e2937;
        color: #94a3b8;
        padding: 15px;
        border-radius: 10px;
        border-left: 5px solid #22c55e;
        overflow-x: auto;
        font-family: monospace;
    }
</style>

<h2>All Medications</h2>

<button (click)="load()">Fetch All</button>

<pre>{{ data | json }}</pre>

<pre *ngIf="errorMsg" style="border-left-color: #ef4444; color: #fca5a5;">{{ errorMsg }}</pre>
