<div class="container">
  <h2>Get Physicians By Department</h2>

  <label>Department ID</label>
  <input
    type="number"
    [(ngModel)]="departmentId"
    name="departmentId"
    placeholder="Enter Department ID"
  >

  <!-- validation error -->
  <p class="error" *ngIf="error">{{ error }}</p>

  <button type="button" (click)="fetchPhysicians()">Fetch</button>

  <!-- result -->
  <div class="result" *ngIf="result">
    <h3>Response</h3>
    <pre>{{ result | json }}</pre>
  </div>
</div>
